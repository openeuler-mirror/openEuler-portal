# 年度活动计划 / Year Plan
#
# 用于活动总览页（EventOverview.vue）时间轴部分。
# 包含两个顶层字段：
#   months    - 英文月份缩写数组，用于时间轴列头
#   year_plan - 年度计划，zh / en 两份
#
# year_plan 分 5 类，每类包含：
#   title / id / icon（图标名） / desc（可选）/ email（可选）
#   events 按月份排列（1~12），有活动时含 actives 列表
#     actives 字段：activeName（必填）、location（可选）、href/activelink（可选链接）
#   college 类特殊：直接用 actives，每项有 startTime（开始月）和 duration（持续月数）
#
# icon 取值：opensource / developer / college / release
# （在 EventOverview.vue 中映射为对应的 SVG 组件）
#
# 加新活动：在对应月份的 actives: 下新增一条，或者给已有月份加上 actives: 字段。
# 申请 Meetup 流程（apply）为固定网站内容，见 ~@/data/event/apply.ts

months:
  - Jan
  - Feb
  - Mar
  - Apr
  - May
  - Jun
  - Jul
  - Aug
  - Sep
  - Oct
  - Nov
  - Dec

