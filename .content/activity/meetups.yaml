# Meetup 活动详情列表 / Meetup Detail List
#
# 用于活动列表页（EventLatest.vue）和活动详情页（EventDetail.vue）。
# zh / en 两份列表，当前 en 为空。
#
# 图片字段说明：
#   posterImg    - 城市海报（PC 端卡片封面图）
#   posterImgMb  - 城市海报（移动端卡片封面图）
#   detail_img   - 活动详情页的议程大图
# 所有图片路径为相对路径（./images/xxx），由 Vite 插件自动转换为带 hash 的 URL。
#
# 字段说明：
#   id           - 数字 ID，对应 calendar.yaml 中 url 里的 ?id= 参数
#   activity_type - 1=已结束  2=进行中
#   series        - 活动系列 ID，对应 filters.yaml 中 series.value
#   isAdditional  - true 表示本条是静态附加数据（非接口返回）
#   signup_url    - 报名链接（PC，活动进行中时显示）
#   signup_url_mb - 报名链接（移动端）
#   new_url       - 活动回顾链接（活动结束后填写）
#
# 加新活动：在 zh: 下方插入新对象（id 递增），同时在 calendar.yaml 中添加对应日历条目。

